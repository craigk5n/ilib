name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Ilib doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        The API, format, or behavior you'd like. Note that the public API in
        `Ilib.h` is kept source-compatible, so additive proposals are easier to
        accept than breaking ones.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this.
