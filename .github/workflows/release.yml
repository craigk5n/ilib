name: Release

# Tagging a version (e.g. `git tag v1.1.10 && git push --tags`) builds the
# release, produces source + binary tarballs with checksums via CPack, and
# publishes them to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # keyless cosign signing (OIDC)

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev

      - name: Verify tag matches the header version
        run: |
          hdr=$(sed -n 's/.*ILIB_VERSION[ \t]*"\([0-9.]*\)".*/\1/p' src/Ilib.h)
          tag="${GITHUB_REF_NAME#v}"
          echo "header=$hdr tag=$tag"
          if [ "$hdr" != "$tag" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match ILIB_VERSION=${hdr}"
            exit 1
          fi
          # Export the bare version (no leading "v") so artifact names match the
          # CPack tarballs (ilib-<version>.tar.gz).
          echo "VERSION=$tag" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DILIB_BUILD_CLIENTS=OFF -DILIB_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package (binary + source tarballs)
        working-directory: build
        run: |
          cpack -G TGZ
          cpack --config CPackSourceConfig.cmake
          sha256sum ilib-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: build/ilib-${{ env.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums and SBOM (keyless, Sigstore)
        working-directory: build
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.cosign.bundle
          cosign sign-blob --yes "ilib-${VERSION}.spdx.json" \
            --bundle "ilib-${VERSION}.spdx.json.cosign.bundle"

      - name: Publish GitHub release
        working-directory: build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            ilib-*.tar.gz SHA256SUMS SHA256SUMS.cosign.bundle \
            "ilib-${VERSION}.spdx.json" \
            "ilib-${VERSION}.spdx.json.cosign.bundle" \
            --title "ilib ${GITHUB_REF_NAME}" \
            --generate-notes
