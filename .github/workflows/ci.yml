name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install giflib jpeg libpng

      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_WERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: sanitizers (asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev
      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_SANITIZE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev lcov
      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_COVERAGE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,negative 2>/dev/null || \
            lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' "$PWD/tests/*" \
            --output-file coverage.info 2>/dev/null || true
          lcov --list coverage.info
          genhtml coverage.info --output-directory coverage-html 2>/dev/null || true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
          if-no-files-found: ignore

  fuzz:
    name: fuzz (libFuzzer smoke)
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libpng-dev libjpeg-dev libgif-dev
      - name: Configure
        run: cmake -B build -DILIB_FUZZ=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Fuzz smoke run
        # Decoders leak on malformed input (known, separate issue); this run
        # targets crashes / overflows / UB, so leak detection is disabled.
        run: |
          ASAN_OPTIONS=detect_leaks=0 ./build/tests/fuzz_decode \
            -max_total_time=60 -timeout=10 -rss_limit_mb=4096
