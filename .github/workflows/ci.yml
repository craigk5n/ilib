name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev \
            libfreetype-dev fonts-dejavu-core

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install giflib jpeg libpng webp libavif freetype

      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_WERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  no-codecs:
    name: build without optional codecs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Configure (no png/jpeg/gif)
        run: |
          cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_WERROR=ON \
            -DILIB_WITH_PNG=OFF -DILIB_WITH_JPEG=OFF -DILIB_WITH_GIF=OFF -DILIB_WITH_WEBP=OFF -DILIB_WITH_AVIF=OFF -DILIB_WITH_FREETYPE=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    # Pinned to clang-format-14 so CI matches the version the tree was
    # formatted with; newer versions can differ. The whole tree is kept
    # clang-format-clean, so this checks every source file.
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format-14
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
      - name: Check formatting
        run: |
          files=$(git ls-files 'src/*.c' 'src/*.h' 'clients/*/*.c' \
            'examples/*/*.c' 'tests/*.c' 'tests/*.h' \
            | grep -vE 'src/rgb.h|tests/greatest.h')
          clang-format-14 --dry-run --Werror $files

  clang-tidy:
    name: clang-tidy (static analysis)
    runs-on: ubuntu-latest
    # Blocking gate: the curated bugprone / static-analyzer baseline (.clang-tidy)
    # is clean, so any new finding fails the build.
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang clang-tidy libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev libfreetype-dev
      - name: Configure (export compile_commands.json)
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on library sources
        run: |
          clang-tidy --warnings-as-errors='*' -p build $(git ls-files 'src/*.c')

  sanitizers:
    name: sanitizers (asan+ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev \
            libfreetype-dev fonts-dejavu-core
      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_SANITIZE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev lcov libfreetype-dev fonts-dejavu-core
      - name: Configure
        run: cmake -B build -DILIB_BUILD_TESTS=ON -DILIB_COVERAGE=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Capture coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,negative 2>/dev/null || \
            lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' "$PWD/tests/*" \
            --output-file coverage.info 2>/dev/null || true
          lcov --list coverage.info
          genhtml coverage.info --output-directory coverage-html 2>/dev/null || true
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html
          if-no-files-found: ignore

  fuzz:
    name: fuzz (libFuzzer smoke)
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev
      - name: Configure
        run: cmake -B build -DILIB_FUZZ=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Fuzz smoke run
        # Blocking regression gate. A fixed seed keeps the 60s run
        # deterministic so it does not flake on unrelated PRs. The decoders are
        # now hardened against leaks on malformed input, so leak detection is
        # enabled: this run gates on crashes / overflows / UB *and* leaks.
        run: |
          ASAN_OPTIONS=detect_leaks=1 ./build/tests/fuzz_decode \
            -max_total_time=60 -timeout=10 -rss_limit_mb=4096 -seed=1

  python-bindings:
    name: python bindings (cffi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpng-dev libjpeg-dev libgif-dev libwebp-dev libavif-dev \
            libfreetype-dev fonts-dejavu-core python3 python3-cffi
      - name: Build the C library
        run: |
          cmake -B build -DILIB_WERROR=ON
          cmake --build build --parallel
      - name: Run the Python binding tests
        working-directory: python
        env:
          # Point the cffi loader at the freshly built (uninstalled) library.
          ILIB_LIBRARY: ${{ github.workspace }}/build/src/libilib.so
        run: |
          PYTHONPATH=src python3 -m unittest discover -s tests -v
